name: Walk-forward fixture guard

on:
  pull_request:

jobs:
  walk-forward:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate walk-forward fixture baseline
        run: python tests/walk_forward_ci_check.py
