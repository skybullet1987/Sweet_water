name: Walk-forward fixture guard

on:
  pull_request:

jobs:
  walk-forward:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt pytest
      - name: Run consolidated tests
        run: pytest tests/test_all.py -v
      - name: Smoke import execution module
        run: python -c "from qc_runtime.execution import KrakenTieredFeeModel, RealisticCryptoSlippage; print('ok')"
      - name: Validate walk-forward gates
        run: pytest tests/test_walk_forward_gates.py -v
