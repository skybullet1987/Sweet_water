  <path class="stroke-dashed" d="M 235 120 L 275 100 L 290 150 L 270 200 L 240 210 L 225 170 Z" opacity="0.6"/> <!-- QC -->
  <path class="stroke-dashed" d="M 55 200 L 85 170 L 95 220 L 80 270 L 55 260 Z" opacity="0.6"/> <!-- BC -->
  <path class="stroke-dashed" d="M 95 200 L 130 185 L 140 230 L 125 265 L 95 255 Z" opacity="0.6"/> <!-- AB -->
  <text x="150" y="330" text-anchor="middle" class="text-hint" fill="#999" stroke="none">CANADA</text>
