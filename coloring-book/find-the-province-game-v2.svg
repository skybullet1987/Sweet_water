  <path d="M 517 70 L 519 76 L 525 76 L 520 80 L 522 86 L 517 82 L 512 86 L 514 80 L 509 76 L 515 76 Z" class="stroke-thin" fill="#fff"/>

  <!-- ========== INSTRUCTION BOX ========== -->
