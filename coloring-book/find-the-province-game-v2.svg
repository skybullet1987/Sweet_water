  <!-- ========== TITLE BANNER ========== -->
  <path d="M 80 52 Q 306 38 532 52 L 548 88 Q 306 102 64 88 Z" class="stroke-bold" fill="#fff"/>
  <text x="306" y="78" text-anchor="middle" class="text-title">FIND THE PROVINCE GAME</text>
