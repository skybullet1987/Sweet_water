  <text x="460" y="183" text-anchor="middle" class="text-label">UNIQUE SHAPES</text>

  <!-- Center prompt -->
  <text x="306" y="400" text-anchor="middle" class="text-label" font-size="12">Draw a line to match!</text>

  <!-- ========== LEFT COLUMN - PROVINCES ========== -->

  <!-- 1 ONTARIO -->
  <g transform="translate(52, 200)">
    <circle cx="14" cy="14" r="12" class="stroke-main" fill="#fff"/>
    <text x="14" y="18" text-anchor="middle" class="text-label" font-size="12">1</text>
