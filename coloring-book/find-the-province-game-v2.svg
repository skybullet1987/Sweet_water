      <!-- Evergreen -->
      <path class="stroke-main" d="M 18 95 L 18 70 L 12 70 L 22 55 L 28 70 L 22 70 L 22 95" fill="#fff"/>
      <path class="stroke-thin" d="M 8 95 L 32 95"/>
      <text x="62" y="118" text-anchor="middle" class="text-hint">Mountains &amp; forest</text>
    </g>
