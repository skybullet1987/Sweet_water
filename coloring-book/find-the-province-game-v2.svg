  <g transform="translate(200, 680)">
    <ellipse cx="106" cy="22" rx="100" ry="20" class="stroke-thin" fill="#fff"/>
    <text x="106" y="20" text-anchor="middle" class="text-hint">Match all 4, then find each province on the map!</text>
