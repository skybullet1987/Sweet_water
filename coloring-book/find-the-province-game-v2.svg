      .stroke-thin { fill: none; stroke: #000; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-dashed { fill: none; stroke: #000; stroke-width: 1.5; stroke-dasharray: 6 4; }
      .fill-white { fill: #fff; }
      .fill-map { fill: #e8e8e8; stroke: #ccc; stroke-width: 1; }
      .text-title { font-family: Arial, Helvetica, sans-serif; font-weight: 900; font-size: 22px; fill: #fff; stroke: #000; stroke-width: 0.8px; paint-order: stroke fill; }
      .text-label { font-family: Arial, Helvetica, sans-serif; font-weight: 800; font-size: 11px; fill: #000; }
      .text-small { font-family: Arial, Helvetica, sans-serif; font-weight: 700; font-size: 8px; fill: #000; }
      .text-hint { font-family: Arial, Helvetica, sans-serif; font-weight: 600; font-size: 7px; fill: #000; }
    </style>
    <!-- Track pattern -->
    <symbol id="track" viewBox="0 0 24 12">
      <ellipse cx="6" cy="6" rx="3" ry="4" fill="none" stroke="#000" stroke-width="1.2"/>
