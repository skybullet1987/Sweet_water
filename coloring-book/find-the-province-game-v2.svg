    <path d="M 2 18 L 8 4 L 14 4 L 20 18 Z" class="stroke-thin" fill="#fff"/>
    <path d="M 8 4 L 11 4 L 11 18 L 8 18 Z" class="stroke-thin" fill="#fff"/>
    <path d="M 6 20 L 16 20" class="stroke-thin"/>
  </g>
  <text x="306" y="118" text-anchor="middle" class="text-label" font-size="10">COLOR AND MATCH THE PROVINCES!</text>

  <!-- Step instructions -->
  <text x="306" y="142" text-anchor="middle" class="text-small">1. Color each shape  2. Draw a line from 1-4 to A-D  3. Color them on the big map!</text>

  <!-- Example match (dotted) -->
  <g transform="translate(248, 148)">
    <circle cx="8" cy="8" r="7" class="stroke-thin" fill="#fff"/>
    <text x="8" y="11" text-anchor="middle" class="text-hint" font-size="8" font-weight="800">1</text>
    <path d="M 18 8 L 58 8" class="stroke-dashed"/>
    <circle cx="68" cy="8" r="7" class="stroke-thin" fill="#fff"/>
